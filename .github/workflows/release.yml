name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:
          - linux
          - darwin
        goarch:
          - amd64
          - arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          go build \
            -ldflags "-s -w -X github.com/alejandro-sg/n8nctl/internal/buildinfo.Version=${GITHUB_REF_NAME} -X github.com/alejandro-sg/n8nctl/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/alejandro-sg/n8nctl/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X github.com/alejandro-sg/n8nctl/internal/buildinfo.BuiltBy=github-actions" \
            -o "dist/n8nctl" .
          tar -C dist -czf "dist/n8nctl_${version}_${GOOS}_${GOARCH}.tar.gz" n8nctl

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
